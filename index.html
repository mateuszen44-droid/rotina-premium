<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotina Premium Pro - Mateus</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff2d2d">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0f;
  color:white;
}

header{
  background:linear-gradient(90deg,#1a1a1a,#300000);
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  border-bottom:2px solid red;
}

.container{
  padding:20px;
}

.card{
  background:#14141c;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border-left:5px solid red;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:red;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.progress-bg{
  height:10px;
  background:#333;
  border-radius:6px;
  margin-top:10px;
}

.progress-fill{
  height:10px;
  width:0%;
  background:red;
  border-radius:6px;
  transition:.3s;
}
</style>
</head>

<body>

<header>
Rotina Premium Pro 🔥
</header>

<div class="container">

<div class="card">
<span>🙏 Devocional 05:00</span>
<button onclick="done()">✔</button>
</div>

<div class="card">
<span>💪 Treino 07:30</span>
<button onclick="done()">✔</button>
</div>

<div class="card">
<span>💼 Trabalho 08:30</span>
<button onclick="done()">✔</button>
</div>

<div class="card">
<span>🐶 Limpar coco 19:45</span>
<button onclick="done()">✔</button>
</div>

<div class="card">
<span>📱 Projetos 21:00</span>
<button onclick="done()">✔</button>
</div>

<h3>Progresso do Dia</h3>
<div class="progress-bg">
<div class="progress-fill" id="bar"></div>
</div>

</div>

<script>
let progress = 0;

function done(){
  if(progress < 100){
    progress += 20;
    document.getElementById("bar").style.width = progress + "%";
  }
}

// registrar service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
